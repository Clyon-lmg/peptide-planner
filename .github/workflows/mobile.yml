name: Mobile Build & Submit

on:
  push:
    branches: [main]
    paths: [mobile/**]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: mobile
      - run: npx eas-cli@latest build --platform all --auto-submit --non-interactive
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
