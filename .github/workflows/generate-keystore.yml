name: Generate Android Keystore (run once)

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: Key alias (e.g. peptideplanner)
        required: true
        default: peptideplanner
      store_password:
        description: Keystore password (save this as ANDROID_KEYSTORE_PASSWORD secret)
        required: true
      key_password:
        description: Key password (save this as ANDROID_KEY_PASSWORD secret)
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=Peptide Planner, OU=Mobile, O=Peptide Planner, L=Unknown, ST=Unknown, C=US"

      - name: Print base64 keystore
        run: |
          echo "=========================================="
          echo "Copy the value below and save it as the"
          echo "ANDROID_KEYSTORE_BASE64 GitHub Secret."
          echo "=========================================="
          base64 -w 0 release.keystore
          echo ""
          echo "=========================================="
          echo "Also save these as GitHub Secrets:"
          echo "  ANDROID_KEY_ALIAS = ${{ github.event.inputs.key_alias }}"
          echo "  ANDROID_KEYSTORE_PASSWORD = (the store password you entered)"
          echo "  ANDROID_KEY_PASSWORD = (the key password you entered)"
          echo "=========================================="
